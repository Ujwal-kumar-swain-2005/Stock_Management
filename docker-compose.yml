version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: stock_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    ports:
      - "3307:3306" # Exposing on 3307 locally to avoid conflicts if you have local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - stock_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db
    networks:
      - stock_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock_frontend
    ports:
      - "80:80"
    networks:
      - stock_network

networks:
  stock_network:

volumes:
  mysql_data:
